<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="The Rodgers Playbook — a civil engineering visual library pairing real-world photos with CAD drawings to teach the concepts behind every project." />
<title>Civil Engineering Visual Library · Rodgers Playbook</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
:root {
  --slate: #3F4E55;
  --slate-deep: #2F3B41;
  --slate-soft: #5B6A70;
  --orange: #D97F39;
  --orange-dark: #B86A2D;
  --orange-soft: #FBEEDD;
  --green: #AFC935;
  --gold: #D4A73F;
  --ink: #1F2933;
  --muted: #6B7780;
  --muted-2: #9AA5AC;
  --line: #E2E6E8;
  --line-2: #EEF1F2;
  --bg: #F7F7F5;
  --card: #FFFFFF;
  --soft: #F2F3F0;
  --radius: 10px;
  --shadow-sm: 0 1px 2px rgba(20,30,40,0.04);
  --shadow: 0 4px 22px rgba(20,30,40,0.06), 0 1px 2px rgba(20,30,40,0.04);
  --shadow-lg: 0 24px 60px rgba(20,30,40,0.18);
  --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --mono: 'JetBrains Mono', ui-monospace, monospace;
}

* { box-sizing: border-box; }
html, body { height: 100%; margin: 0; }
body {
  font-family: var(--font);
  color: var(--ink);
  background: var(--bg);
  font-size: 15px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}
button, input, select, textarea { font-family: inherit; }
button { cursor: pointer; border: none; background: none; color: inherit; }
a { color: var(--orange-dark); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ========== TOP BAR ========== */
.topbar {
  background: var(--slate);
  color: #fff;
  padding: 14px 24px;
  display: flex;
  align-items: center;
  gap: 18px;
  position: sticky; top: 0; z-index: 50;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.brand { display: flex; align-items: center; gap: 12px; }
.brand-mark {
  width: 30px; height: 30px; border-radius: 6px;
  background: var(--orange); color: #fff;
  display: grid; place-items: center;
  font-weight: 800; font-family: var(--mono); font-size: 16px;
}
.brand-text { line-height: 1.1; }
.brand-name {
  font-family: var(--mono); font-weight: 700; font-size: 13px;
  letter-spacing: 0.18em; text-transform: uppercase;
}
.brand-sub {
  font-size: 11px; color: var(--green);
  letter-spacing: 0.18em; text-transform: uppercase;
  font-family: var(--mono); margin-top: 2px;
}
.spacer { flex: 1; }

.search-wrap {
  position: relative;
  display: flex; align-items: center;
}
.search-input {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.1);
  color: #fff;
  padding: 8px 12px 8px 34px;
  border-radius: 7px;
  font-size: 13px;
  width: 240px;
  outline: none;
  transition: all 0.15s;
}
.search-input::placeholder { color: rgba(255,255,255,0.5); }
.search-input:focus {
  background: rgba(255,255,255,0.12);
  border-color: var(--orange);
  width: 300px;
}
.search-icon {
  position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
  color: rgba(255,255,255,0.5); pointer-events: none;
}

.top-link {
  font-size: 12px; color: rgba(255,255,255,0.7);
  padding: 7px 12px; border-radius: 6px;
  transition: all 0.15s;
  font-weight: 500;
}
.top-link:hover { background: rgba(255,255,255,0.08); color: #fff; }
.top-link.cta {
  background: var(--orange); color: #fff;
}
.top-link.cta:hover { background: var(--orange-dark); }

.menu-btn {
  display: none; width: 32px; height: 32px;
  border-radius: 6px; color: #fff;
}
.menu-btn:hover { background: rgba(255,255,255,0.08); }

/* ========== LAYOUT ========== */
.app {
  display: grid;
  grid-template-columns: 300px 1fr;
  min-height: calc(100vh - 56px);
}

/* ========== SIDEBAR ========== */
.sidebar {
  background: #fff;
  border-right: 1px solid var(--line);
  overflow-y: auto;
  padding: 16px 0;
  position: sticky; top: 56px;
  height: calc(100vh - 56px);
}
.side-section-title {
  font-family: var(--mono); font-size: 10.5px;
  text-transform: uppercase; letter-spacing: 0.15em;
  color: var(--muted); font-weight: 700;
  padding: 8px 22px;
  display: flex; justify-content: space-between; align-items: center;
}
.side-section-title .count {
  background: var(--soft); color: var(--slate);
  font-size: 10px; padding: 1px 7px; border-radius: 10px;
  font-weight: 600;
}

.module-block { padding: 0 8px; }
.module-head {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.12s;
}
.module-head:hover { background: var(--soft); }
.module-num {
  font-family: var(--mono); font-weight: 700; font-size: 13px;
  width: 28px; text-align: center;
  letter-spacing: -0.02em;
}
.module-title {
  flex: 1; font-weight: 600; font-size: 13.5px; color: var(--slate);
}
.module-chevron {
  color: var(--muted-2); font-size: 10px;
  transition: transform 0.15s;
}
.module-block.collapsed .module-chevron { transform: rotate(-90deg); }
.module-block.collapsed .module-slides { display: none; }

.module-slides { padding: 4px 0 8px 8px; }
.slide-link {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 14px 7px 36px;
  font-size: 12.5px;
  color: var(--slate-soft);
  border-radius: 6px;
  cursor: pointer;
  position: relative;
  transition: all 0.12s;
  text-decoration: none;
}
.slide-link::before {
  content: ''; position: absolute; left: 22px; top: 50%;
  width: 4px; height: 4px; border-radius: 50%;
  background: var(--muted-2); transform: translateY(-50%);
}
.slide-link:hover { background: var(--soft); color: var(--slate); }
.slide-link.active {
  background: var(--orange-soft); color: var(--orange-dark);
  font-weight: 600;
}
.slide-link.active::before { background: var(--orange); }
.slide-link .ttl { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.slide-link .narr-icon {
  color: var(--green); font-size: 11px;
  opacity: 0.7;
}

/* ========== MAIN ========== */
.main {
  padding: 32px 40px 60px;
  max-width: 1200px;
  width: 100%;
}

.crumb {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--mono); font-size: 11px;
  color: var(--muted); text-transform: uppercase; letter-spacing: 0.15em;
  margin-bottom: 14px;
  font-weight: 600;
}
.crumb .sep { color: var(--muted-2); }
.crumb .current { color: var(--orange); }

.slide-title {
  font-size: 30px;
  font-weight: 700;
  color: var(--slate);
  letter-spacing: -0.02em;
  line-height: 1.18;
  margin: 0 0 6px;
}
.slide-subtitle {
  font-size: 16px; color: var(--slate-soft);
  font-style: italic;
  margin: 0 0 20px;
}

.tag-row {
  display: flex; gap: 8px; flex-wrap: wrap;
  margin-bottom: 24px;
}
.tag {
  font-family: var(--mono); font-size: 10.5px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.1em;
  padding: 4px 10px; border-radius: 14px;
  background: var(--soft); color: var(--slate);
  border: 1px solid var(--line);
}
.tag.amber { background: var(--orange-soft); color: var(--orange-dark); border-color: #F0DCC2; }
.tag.green { background: #F0F7DC; color: #5C7012; border-color: #DDE8B6; }
.tag.gold  { background: #FBF1D8; color: #8B6614; border-color: #F1DFAE; }

/* Image pair */
.image-pair {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 22px;
}
.image-pair.single-image {
  grid-template-columns: 1fr;
}
.image-pair.single-image .image-card .img-wrap {
  aspect-ratio: 16 / 9;
}
.image-card {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  transition: transform 0.15s, box-shadow 0.15s;
  cursor: zoom-in;
}
.image-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
.image-card .img-wrap {
  aspect-ratio: 4 / 3;
  background: linear-gradient(135deg, #f4f5f3, #e9ebe7);
  position: relative;
  overflow: hidden;
}
.image-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
.image-card .placeholder {
  position: absolute; inset: 0;
  display: grid; place-items: center;
  text-align: center;
  padding: 30px;
  color: var(--muted);
  font-size: 13px;
}
.image-card .placeholder svg { margin-bottom: 8px; opacity: 0.5; }
.image-card .type-chip {
  position: absolute; top: 12px; left: 12px;
  background: rgba(63, 78, 85, 0.92);
  color: #fff;
  font-family: var(--mono); font-size: 10px; font-weight: 600;
  letter-spacing: 0.12em; text-transform: uppercase;
  padding: 4px 9px; border-radius: 4px;
  backdrop-filter: blur(6px);
}
.image-card .label {
  padding: 12px 16px;
  font-size: 13.5px;
  color: var(--slate);
  font-weight: 500;
  border-top: 1px solid var(--line-2);
  background: #fff;
}

/* Annotations overlay */
.annotation-pin {
  position: absolute;
  width: 22px; height: 22px;
  background: var(--orange);
  border: 2px solid #fff;
  border-radius: 50%;
  color: #fff;
  font-family: var(--mono); font-weight: 700; font-size: 11px;
  display: grid; place-items: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  cursor: help;
}

/* Key Lesson */
.key-lesson {
  background: linear-gradient(to right, var(--orange-soft) 0%, #fff 75%);
  border-left: 3px solid var(--orange);
  padding: 18px 22px;
  border-radius: 8px;
  margin-bottom: 28px;
  display: flex; gap: 16px; align-items: flex-start;
}
.key-lesson .icon {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: var(--orange);
  color: #fff;
  display: grid; place-items: center;
  font-weight: 700; font-size: 16px;
  flex-shrink: 0;
}
.key-lesson .body { flex: 1; }
.key-lesson .label {
  font-family: var(--mono); font-size: 10.5px;
  font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em;
  color: var(--orange-dark);
  margin-bottom: 4px;
}
.key-lesson .text {
  font-size: 15px;
  color: var(--ink);
  font-weight: 500;
  line-height: 1.5;
}

/* Narration */
.narration-card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-bottom: 24px;
  display: flex; align-items: center; gap: 16px;
}
.narration-card .narr-icon {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: var(--green);
  color: #fff;
  display: grid; place-items: center;
  flex-shrink: 0;
}
.narration-card .narr-text {
  flex: 1; min-width: 0;
}
.narration-card .narr-label {
  font-family: var(--mono); font-size: 10.5px;
  font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em;
  color: var(--green); margin-bottom: 3px;
}
.narration-card .narr-title {
  font-size: 13.5px; color: var(--slate); font-weight: 500;
}
.narration-card audio {
  flex: 1.5;
  height: 36px;
}

.no-narration {
  background: var(--soft);
  border: 1px dashed var(--line);
  padding: 14px 18px;
  border-radius: 8px;
  font-size: 13px; color: var(--muted);
  margin-bottom: 24px;
  display: flex; align-items: center; gap: 10px;
  font-style: italic;
}

/* Teaching Scaffold */
.teaching-section {
  margin-bottom: 28px;
}
.section-header {
  font-family: var(--mono); font-size: 11px;
  text-transform: uppercase; letter-spacing: 0.18em;
  color: var(--muted); font-weight: 700;
  margin-bottom: 14px;
  display: flex; align-items: center; gap: 10px;
}
.section-header::after {
  content: ''; flex: 1; height: 1px; background: var(--line);
}
.teach-grid { display: flex; flex-direction: column; gap: 10px; }
.teach-row {
  display: flex; gap: 14px; align-items: flex-start;
  padding: 12px 16px;
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 8px;
}
.teach-num {
  width: 26px; height: 26px;
  border-radius: 6px;
  background: var(--orange-soft); color: var(--orange-dark);
  display: grid; place-items: center;
  font-family: var(--mono); font-weight: 700; font-size: 13px;
  flex-shrink: 0;
}
.teach-body { flex: 1; }
.teach-q { font-size: 13.5px; font-weight: 600; color: var(--slate); margin-bottom: 4px; }
.teach-a { font-size: 13px; color: var(--slate-soft); line-height: 1.5; }
.teach-row.empty .teach-a { color: var(--muted-2); font-style: italic; }

/* Bottom nav */
.slide-nav {
  display: flex; justify-content: space-between; align-items: center;
  padding: 24px 0;
  border-top: 1px solid var(--line);
  margin-top: 30px;
}
.slide-nav-btn {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 12px 20px;
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 8px;
  font-size: 14px; font-weight: 500;
  color: var(--slate);
  transition: all 0.15s;
  text-decoration: none;
}
.slide-nav-btn:hover {
  border-color: var(--orange); color: var(--orange-dark);
  text-decoration: none;
}
.slide-nav-btn.disabled {
  opacity: 0.4; pointer-events: none;
}
.slide-nav-btn .ctx {
  font-family: var(--mono); font-size: 10.5px;
  text-transform: uppercase; letter-spacing: 0.12em;
  color: var(--muted); display: block; margin-bottom: 1px;
}
.slide-nav-btn .ttl {
  font-size: 13px; max-width: 240px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* Module overview cards (homepage) */
.hero {
  background: var(--slate);
  color: #fff;
  padding: 50px 40px 60px;
  margin: -32px -40px 32px;
  position: relative;
  overflow: hidden;
}
.hero::before, .hero::after {
  content: ''; position: absolute; pointer-events: none;
}
.hero::before {
  left: 6%; right: 0; top: 60%;
  height: 1.5px; background: var(--green);
}
.hero::after {
  top: 25%; bottom: 0;
  left: 70%; width: 1.5px; background: var(--gold);
}
.hero-eyebrow {
  font-family: var(--mono); font-size: 12px; font-weight: 700;
  letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--orange); margin-bottom: 14px;
}
.hero-title {
  font-size: 44px;
  font-weight: 700;
  letter-spacing: -0.025em;
  line-height: 1.05;
  margin: 0 0 14px;
  max-width: 750px;
}
.hero-tagline {
  font-size: 16px;
  color: var(--green);
  font-style: italic;
  max-width: 600px;
  position: relative; z-index: 2;
}

.modules-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
  margin-bottom: 40px;
}
.module-card {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 22px 24px;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
  overflow: hidden;
}
.module-card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: 4px; background: var(--accent, var(--orange));
}
.module-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow);
  border-color: transparent;
}
.module-card .num {
  font-family: var(--mono); font-size: 26px; font-weight: 700;
  color: var(--accent, var(--orange));
  letter-spacing: -0.04em;
  margin-bottom: 8px;
}
.module-card .name {
  font-size: 17px; font-weight: 700; color: var(--slate);
  margin-bottom: 6px;
  line-height: 1.25;
}
.module-card .desc {
  font-size: 13px; color: var(--slate-soft);
  margin-bottom: 14px;
  line-height: 1.5;
}
.module-card .stats {
  font-family: var(--mono); font-size: 11px;
  color: var(--muted); font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  display: flex; gap: 14px;
}

/* ========== PRESENT MODE ========== */
.present-mode {
  position: fixed; inset: 0;
  background: #0F1518;
  z-index: 200;
  display: none;
  flex-direction: column;
  color: #fff;
}
.present-mode.active { display: flex; }
.p-header {
  display: flex; align-items: center;
  padding: 20px 36px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.p-topic {
  font-family: var(--mono); font-size: 11px;
  letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--orange);
  font-weight: 700;
}
.p-counter {
  margin-left: auto; font-family: var(--mono);
  font-size: 13px; color: rgba(255,255,255,0.5);
}
.p-close {
  margin-left: 18px; padding: 8px 14px;
  font-size: 12px; background: rgba(255,255,255,0.06);
  color: #fff; border-radius: 6px; font-weight: 500;
}
.p-close:hover { background: rgba(255,255,255,0.12); }

.p-body {
  flex: 1;
  display: flex; flex-direction: column;
  padding: 30px 60px;
  overflow: hidden;
}
.p-title {
  font-size: 38px;
  font-weight: 700;
  letter-spacing: -0.025em;
  margin: 0 0 4px;
  line-height: 1.1;
}
.p-subtitle {
  font-size: 16px; color: rgba(255,255,255,0.5);
  margin-bottom: 26px; font-style: italic;
}
.p-images {
  display: grid; grid-template-columns: 1fr 1fr; gap: 22px;
  flex: 1; min-height: 0;
}
.p-images.single-image {
  grid-template-columns: 1fr;
}
.p-images.single-image .p-img-wrap:nth-child(2) {
  display: none;
}
.p-img-wrap {
  background: #1A2127;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  overflow: hidden;
  display: flex; flex-direction: column;
}
.p-img {
  flex: 1;
  display: grid; place-items: center;
  background: #0A0F12;
  color: #475569;
}
.p-img img { max-width: 100%; max-height: 100%; object-fit: contain; }
.p-img-label {
  padding: 14px 18px;
  font-size: 13.5px;
  background: #1A2127;
  border-top: 1px solid rgba(255,255,255,0.06);
  display: flex; align-items: center; gap: 12px;
}
.p-img-label .chip {
  font-family: var(--mono); font-size: 10px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  background: rgba(217,127,57,0.15); color: var(--orange);
  padding: 3px 8px; border-radius: 4px;
}

.p-takeaway {
  margin-top: 22px;
  padding: 18px 24px;
  background: linear-gradient(to right, rgba(217,127,57,0.15), rgba(217,127,57,0.04));
  border-left: 3px solid var(--orange);
  border-radius: 10px;
}
.p-takeaway .lbl {
  font-family: var(--mono); font-size: 10.5px; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--orange); margin-bottom: 4px;
}
.p-takeaway .text {
  font-size: 15.5px; color: #f1f5f9; font-weight: 500;
  line-height: 1.5;
}
.p-footer {
  display: flex; align-items: center; gap: 14px;
  padding: 18px 60px;
  border-top: 1px solid rgba(255,255,255,0.08);
}
.p-nav-btn {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  color: #fff;
  display: grid; place-items: center;
  transition: background 0.15s;
}
.p-nav-btn:hover { background: var(--orange); }
.p-nav-btn:disabled { opacity: 0.3; pointer-events: none; }
.p-audio { flex: 1; }
.p-audio audio { width: 100%; }
.p-hint {
  font-family: var(--mono); font-size: 11px;
  color: rgba(255,255,255,0.35);
}

/* ========== LIGHTBOX ========== */
.lightbox {
  position: fixed; inset: 0;
  background: rgba(15,21,24,0.95);
  z-index: 300;
  display: none;
  align-items: center; justify-content: center;
  padding: 40px;
}
.lightbox.active { display: flex; }
.lightbox img { max-width: 100%; max-height: 100%; object-fit: contain; }
.lightbox-close {
  position: absolute; top: 20px; right: 24px;
  background: rgba(255,255,255,0.1); color: #fff;
  width: 40px; height: 40px; border-radius: 50%;
  display: grid; place-items: center;
}

/* ========== MOBILE ========== */
@media (max-width: 920px) {
  .menu-btn { display: grid; place-items: center; }
  .search-input { width: 160px; }
  .search-input:focus { width: 200px; }
  .app { grid-template-columns: 1fr; }
  .sidebar {
    position: fixed; left: 0; top: 56px;
    width: 280px; height: calc(100vh - 56px);
    transform: translateX(-100%);
    transition: transform 0.2s;
    z-index: 40;
    box-shadow: var(--shadow-lg);
  }
  .sidebar.open { transform: translateX(0); }
  .sidebar-backdrop {
    display: none; position: fixed; inset: 56px 0 0 0;
    background: rgba(0,0,0,0.4); z-index: 35;
  }
  .sidebar-backdrop.active { display: block; }
  .main { padding: 24px 18px 50px; }
  .hero { margin: -24px -18px 24px; padding: 36px 22px 44px; }
  .hero-title { font-size: 32px; }
  .image-pair { grid-template-columns: 1fr; gap: 14px; }
  .slide-title { font-size: 24px; }
  .modules-grid { grid-template-columns: 1fr; }
  .p-body { padding: 20px 22px; }
  .p-images { grid-template-columns: 1fr; gap: 14px; }
  .p-title { font-size: 26px; }
  .p-footer { padding: 14px 22px; }
  .p-hint { display: none; }
}

/* ========== UTILITIES ========== */
.hidden { display: none !important; }
.empty-state {
  padding: 60px 20px; text-align: center; color: var(--muted);
}
.empty-state svg { color: var(--muted-2); margin-bottom: 14px; }
.empty-state h3 { font-size: 18px; color: var(--slate); margin: 0 0 6px; }
.empty-state p { font-size: 14px; margin: 0; }

/* Footer */
.site-footer {
  border-top: 1px solid var(--line);
  background: #fff;
  padding: 24px 40px;
  margin-top: 60px;
}
.site-footer-inner {
  max-width: 1200px; margin: 0 auto;
  display: flex; align-items: center;
  flex-wrap: wrap; gap: 20px;
}
.site-footer .tagline {
  font-style: italic; font-size: 13px;
  color: var(--green);
  font-weight: 500;
}
.site-footer .meta {
  margin-left: auto;
  font-family: var(--mono); font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.1em; text-transform: uppercase;
}
.site-footer a { color: var(--slate-soft); }

::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 5px; border: 2px solid transparent; background-clip: padding-box; }
::-webkit-scrollbar-thumb:hover { background: #94a3b8; border: 2px solid transparent; background-clip: padding-box; }
</style>
</head>
<body>

<header class="topbar">
  <button class="menu-btn" onclick="toggleSidebar()" aria-label="Menu">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
  </button>
  <a href="#/" class="brand" style="text-decoration:none;">
    <div class="brand-mark">R</div>
    <div class="brand-text">
      <div class="brand-name">Rodgers</div>
      <div class="brand-sub">Visual Library</div>
    </div>
  </a>
  <div class="spacer"></div>
  <div class="search-wrap">
    <span class="search-icon">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    </span>
    <input id="searchInput" class="search-input" placeholder="Search slides…" oninput="onSearch()" />
  </div>
  <button class="top-link cta" onclick="startPresent()">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" style="margin-right: 5px; vertical-align: -1px;"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    Present
  </button>
</header>

<div class="sidebar-backdrop" onclick="toggleSidebar()" id="backdrop"></div>

<div class="app">

  <aside class="sidebar" id="sidebar">
    <div class="side-section-title">
      Topic Modules
      <span class="count" id="moduleCount">10</span>
    </div>
    <div id="moduleNav"></div>
  </aside>

  <main class="main" id="main">
    <!-- Rendered by JS -->
  </main>
</div>

<footer class="site-footer">
  <div class="site-footer-inner">
    <div class="tagline">Creating communities with clients who share our values.</div>
    <div class="meta" id="footerMeta">Rodgers Playbook · Visual Library</div>
  </div>
</footer>

<!-- Present mode -->
<div class="present-mode" id="presentMode">
  <div class="p-header">
    <div>
      <div class="p-topic" id="pTopic">Module</div>
      <div style="font-size: 13.5px; color: rgba(255,255,255,0.5); margin-top: 3px;" id="pPairing">Pairing</div>
    </div>
    <div class="p-counter" id="pCounter">1 / 1</div>
    <button class="p-close" onclick="endPresent()">✕ Exit (Esc)</button>
  </div>
  <div class="p-body">
    <h1 class="p-title" id="pTitle">Title</h1>
    <div class="p-subtitle" id="pSubtitle"></div>
    <div class="p-images">
      <div class="p-img-wrap">
        <div class="p-img" id="pImgA">No image</div>
        <div class="p-img-label"><span class="chip" id="pTagA">A</span><span id="pLabelA"></span></div>
      </div>
      <div class="p-img-wrap">
        <div class="p-img" id="pImgB">No image</div>
        <div class="p-img-label"><span class="chip" id="pTagB">B</span><span id="pLabelB"></span></div>
      </div>
    </div>
    <div class="p-takeaway" id="pTakeawayBox">
      <div class="lbl">Key Lesson</div>
      <div class="text" id="pTakeaway"></div>
    </div>
  </div>
  <div class="p-footer">
    <button class="p-nav-btn" id="pPrev" onclick="presentPrev()" aria-label="Previous">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="p-nav-btn" id="pNext" onclick="presentNext()" aria-label="Next">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
    <div class="p-audio" id="pAudioBox">
      <audio id="pAudio" controls></audio>
    </div>
    <div class="p-hint">← → next &nbsp;·&nbsp; Space play &nbsp;·&nbsp; Esc exit</div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" aria-label="Close">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </button>
  <img id="lightboxImg" alt="" />
</div>

<script>
/* =====================================================
   PUBLIC VIEWER · loads data/library.json and renders
   read-only. No edit controls.
   ===================================================== */

let LIBRARY = null;
let activeMod = 0;
let activeSlide = -1; // -1 = module overview / homepage
let searchQuery = '';

const PAIRING_LABELS = {
  'real-vs-cad':         'Real-world + CAD',
  'existing-vs-finished':'Existing + Finished',
  'diagram-vs-field':    'Diagram + Field',
  'plan-vs-section':     'Plan + Section',
  'construction-vs-final':'Construction + Final',
  'good-vs-bad':         'Good + Bad Example',
  'custom':              'Custom'
};
const PAIRING_TAG_CLASS = {
  'real-vs-cad':         'amber',
  'existing-vs-finished':'green',
  'diagram-vs-field':    'gold',
  'plan-vs-section':     '',
  'construction-vs-final':'amber',
  'good-vs-bad':         'green',
  'custom':              ''
};
const TEACHING_QUESTIONS = [
  'What are we looking at?',
  'What is the relationship between the two?',
  'Why does it matter on a project?',
  'What should an intern notice?',
  'Takeaway'
];

async function loadLibrary() {
  try {
    const res = await fetch('data/library.json');
    if (!res.ok) throw new Error('Failed to load library');
    LIBRARY = await res.json();
    document.title = (LIBRARY.title || 'Visual Library') + ' · Rodgers Playbook';
    document.getElementById('moduleCount').textContent = LIBRARY.modules.length;
    if (LIBRARY.updated) {
      document.getElementById('footerMeta').textContent =
        `Updated ${LIBRARY.updated} · Rodgers Playbook`;
    }
    handleHash();
    renderSidebar();
  } catch (err) {
    console.error(err);
    document.getElementById('main').innerHTML =
      `<div class="empty-state"><h3>Could not load library</h3>
       <p>The data file (data/library.json) is missing or invalid.</p></div>`;
  }
}

function escapeHtml(s) {
  return String(s||'').replace(/[&<>"']/g, m => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[m]));
}

/* Routing — hash-based: #/module/slide */
function handleHash() {
  const hash = location.hash.slice(2);
  if (!hash) {
    activeMod = 0; activeSlide = -1;
    renderHome();
    return;
  }
  const [modId, slideId] = hash.split('/');
  const mi = LIBRARY.modules.findIndex(m => m.id === modId);
  if (mi < 0) {
    activeMod = 0; activeSlide = -1;
    renderHome();
    return;
  }
  activeMod = mi;
  if (!slideId) {
    activeSlide = -1;
    renderHome();
    return;
  }
  const si = LIBRARY.modules[mi].slides.findIndex(s => s.id === slideId);
  activeSlide = si >= 0 ? si : 0;
  renderSlide();
}

window.addEventListener('hashchange', handleHash);

function navTo(modId, slideId) {
  const hash = slideId ? `#/${modId}/${slideId}` : `#/${modId}`;
  if (location.hash !== hash) location.hash = hash;
  else handleHash();
  if (window.innerWidth <= 920) closeSidebar();
}

/* Sidebar */
function renderSidebar() {
  const nav = document.getElementById('moduleNav');
  nav.innerHTML = '';
  LIBRARY.modules.forEach((mod, mi) => {
    const slidesMatch = mod.slides.filter(s => slideMatchesSearch(s));
    if (searchQuery && slidesMatch.length === 0) return;

    const block = document.createElement('div');
    const isOpen = mi === activeMod || searchQuery;
    block.className = 'module-block' + (isOpen ? '' : ' collapsed');
    block.innerHTML = `
      <div class="module-head" onclick="toggleModule(${mi})">
        <div class="module-num" style="color:${mod.color || '#3F4E55'}">${mod.icon || mi+1}</div>
        <div class="module-title">${escapeHtml(mod.title)}</div>
        <div class="module-chevron">▾</div>
      </div>
      <div class="module-slides">
        ${slidesMatch.map(s => {
          const sIdx = mod.slides.indexOf(s);
          const isActive = (mi === activeMod && sIdx === activeSlide);
          const hasNarr = s.narration && s.narration.audio;
          return `
            <a class="slide-link${isActive?' active':''}"
               href="#/${mod.id}/${s.id}"
               onclick="event.preventDefault(); navTo('${mod.id}','${s.id}')">
              <span class="ttl">${escapeHtml(s.title)}</span>
              ${hasNarr ? '<span class="narr-icon" title="Narration available">🎙</span>' : ''}
            </a>`;
        }).join('')}
      </div>`;
    nav.appendChild(block);
  });
}

function toggleModule(mi) {
  // Click expands or jumps
  if (mi === activeMod && activeSlide === -1) {
    // Already on this module's home — collapse it
    const blocks = document.querySelectorAll('.module-block');
    blocks[mi].classList.toggle('collapsed');
    return;
  }
  navTo(LIBRARY.modules[mi].id);
}

function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const bd = document.getElementById('backdrop');
  sb.classList.toggle('open');
  bd.classList.toggle('active');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('backdrop').classList.remove('active');
}

/* Search */
function onSearch() {
  searchQuery = document.getElementById('searchInput').value.trim().toLowerCase();
  renderSidebar();
  if (activeSlide === -1) renderHome();
}
function slideMatchesSearch(s) {
  if (!searchQuery) return true;
  const blob = [
    s.title, s.subtitle, s.keyLesson, s.tags,
    s.images?.[0]?.label, s.images?.[1]?.label,
    s.images?.[0]?.type, s.images?.[1]?.type,
    Object.values(s.teaching || {}).join(' ')
  ].filter(Boolean).join(' ').toLowerCase();
  return blob.includes(searchQuery);
}

/* Home / module overview */
function renderHome() {
  const main = document.getElementById('main');

  if (activeMod === 0 && !searchQuery && location.hash === '') {
    // Top-level homepage
    let html = `
      <div class="hero">
        <div class="hero-eyebrow">The Rodgers Playbook</div>
        <h1 class="hero-title">${escapeHtml(LIBRARY.title)}</h1>
        <div class="hero-tagline">${escapeHtml(LIBRARY.tagline || '')}</div>
      </div>
      <div class="section-header">Topic Modules</div>
      <div class="modules-grid">
    `;
    LIBRARY.modules.forEach((mod, mi) => {
      const numNarr = mod.slides.filter(s => s.narration && s.narration.audio).length;
      html += `
        <div class="module-card" style="--accent:${mod.color || '#D97F39'}"
             onclick="navTo('${mod.id}')">
          <div class="num">${mod.icon || String(mi+1).padStart(2,'0')}</div>
          <div class="name">${escapeHtml(mod.title)}</div>
          ${mod.description ? `<div class="desc">${escapeHtml(mod.description)}</div>` : ''}
          <div class="stats">
            <span>${mod.slides.length} slides</span>
            ${numNarr ? `<span>${numNarr} narrated</span>` : ''}
          </div>
        </div>`;
    });
    html += `</div>`;
    main.innerHTML = html;
    return;
  }

  // Single-module overview
  const mod = LIBRARY.modules[activeMod];
  const slidesMatch = mod.slides.filter(s => slideMatchesSearch(s));
  let html = `
    <div class="crumb">
      <a href="#/" onclick="event.preventDefault(); location.hash='';" style="color:var(--muted); text-decoration:none;">All Modules</a>
      <span class="sep">›</span>
      <span class="current">${escapeHtml(mod.title)}</span>
    </div>
    <h1 class="slide-title">${escapeHtml(mod.title)}</h1>
    ${mod.description ? `<div class="slide-subtitle">${escapeHtml(mod.description)}</div>` : ''}
    <div class="section-header">Slides in this module</div>
    <div class="modules-grid">
  `;
  slidesMatch.forEach((s) => {
    const hasA = !!(s.images?.[0]?.src);
    const hasB = !!(s.images?.[1]?.src);
    const hasNarr = !!(s.narration && s.narration.audio);
    html += `
      <div class="module-card" style="--accent:${mod.color || '#D97F39'}"
           onclick="navTo('${mod.id}','${s.id}')">
        <div class="name" style="font-size:16px;">${escapeHtml(s.title)}</div>
        ${s.subtitle ? `<div class="desc">${escapeHtml(s.subtitle)}</div>` : ''}
        <div class="stats">
          <span>${PAIRING_LABELS[s.pairing] || s.pairing}</span>
          ${hasA && hasB ? '<span>● Images</span>' : ''}
          ${hasNarr ? '<span style="color:var(--green)">● Narrated</span>' : ''}
        </div>
      </div>`;
  });
  if (slidesMatch.length === 0) {
    html += `<div class="empty-state"><h3>No matching slides</h3><p>Try a different search.</p></div>`;
  }
  html += `</div>`;
  main.innerHTML = html;
}

/* Single slide view */
function renderSlide() {
  const mod = LIBRARY.modules[activeMod];
  const slide = mod.slides[activeSlide];
  if (!slide) return renderHome();

  const main = document.getElementById('main');
  const pairCls = PAIRING_TAG_CLASS[slide.pairing] || '';
  const hasNarr = !!(slide.narration && slide.narration.audio);

  let html = `
    <div class="crumb">
      <a href="#/" onclick="event.preventDefault(); location.hash='';" style="color:var(--muted); text-decoration:none;">All</a>
      <span class="sep">›</span>
      <a href="#/${mod.id}" onclick="event.preventDefault(); navTo('${mod.id}')" style="color:var(--muted); text-decoration:none;">${escapeHtml(mod.title)}</a>
      <span class="sep">›</span>
      <span class="current">Slide ${activeSlide + 1}</span>
    </div>

    <h1 class="slide-title">${escapeHtml(slide.title)}</h1>
    ${slide.subtitle ? `<div class="slide-subtitle">${escapeHtml(slide.subtitle)}</div>` : ''}

    <div class="tag-row">
      <span class="tag ${pairCls}">${PAIRING_LABELS[slide.pairing] || slide.pairing}</span>
      ${slide.level ? `<span class="tag">Level ${slide.level}</span>` : ''}
      ${(slide.tags || '').split(',').filter(t=>t.trim()).map(t =>
        `<span class="tag">${escapeHtml(t.trim())}</span>`).join('')}
    </div>

    <div class="image-pair${(slide.imageLayout || 'two') === 'one' ? ' single-image' : ''}">
      ${renderImageCard(slide, 0, mod.id)}
      ${(slide.imageLayout || 'two') === 'two' ? renderImageCard(slide, 1, mod.id) : ''}
    </div>

    ${slide.keyLesson ? `
    <div class="key-lesson">
      <div class="icon">!</div>
      <div class="body">
        <div class="label">Key Lesson</div>
        <div class="text">${escapeHtml(slide.keyLesson)}</div>
      </div>
    </div>` : ''}

    ${hasNarr ? `
    <div class="narration-card">
      <div class="narr-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      </div>
      <div class="narr-text">
        <div class="narr-label">Voice Narration</div>
        <div class="narr-title">Listen to the explanation</div>
      </div>
      <audio src="${escapeHtml(slide.narration.audio)}" controls></audio>
    </div>` : ''}

    ${renderTeaching(slide)}

    ${renderSlideNav()}
  `;
  main.innerHTML = html;
  // Scroll main to top on slide change
  window.scrollTo(0, 0);
}

function renderImageCard(slide, i, modId) {
  const img = slide.images?.[i] || {};
  const ann = (slide.annotations || []).filter(a => a.image === (i === 0 ? 'A' : 'B'));
  const hasImg = !!img.src;
  return `
    <div class="image-card" onclick="${hasImg ? `openLightbox('${escapeHtml(img.src)}','${escapeHtml(img.label||'')}')` : ''}">
      <div class="img-wrap">
        ${img.type ? `<div class="type-chip">${escapeHtml(img.type)}</div>` : ''}
        ${hasImg
          ? `<img src="${escapeHtml(img.src)}" alt="${escapeHtml(img.label || '')}" />`
          : `<div class="placeholder">
               <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
               <div>${escapeHtml(img.label || 'Image not yet added')}</div>
             </div>`}
        ${ann.map((a, idx) => `
          <div class="annotation-pin"
               style="left:${a.x ?? (12 + idx*40)}px; top:${a.y ?? (12 + idx*40)}px;"
               title="${escapeHtml(a.text)}">${idx+1}</div>
        `).join('')}
      </div>
      ${img.label ? `<div class="label">${escapeHtml(img.label)}</div>` : ''}
    </div>`;
}

function renderTeaching(slide) {
  const t = slide.teaching || {};
  const filled = ['t1','t2','t3','t4','t5'].filter(k => (t[k]||'').trim());
  if (filled.length === 0) return '';
  let html = `
    <div class="teaching-section">
      <div class="section-header">Teaching Notes</div>
      <div class="teach-grid">
  `;
  TEACHING_QUESTIONS.forEach((q, i) => {
    const ans = (t[`t${i+1}`] || '').trim();
    if (!ans) return; // skip empties on viewer
    html += `
      <div class="teach-row">
        <div class="teach-num">${i+1}</div>
        <div class="teach-body">
          <div class="teach-q">${q}</div>
          <div class="teach-a">${escapeHtml(ans)}</div>
        </div>
      </div>`;
  });
  html += `</div></div>`;
  return html;
}

function renderSlideNav() {
  const mod = LIBRARY.modules[activeMod];
  const prev = activeSlide > 0 ? mod.slides[activeSlide - 1] : null;
  let nextSlide = null, nextModId = mod.id;
  if (activeSlide < mod.slides.length - 1) {
    nextSlide = mod.slides[activeSlide + 1];
  } else if (activeMod < LIBRARY.modules.length - 1) {
    const nm = LIBRARY.modules[activeMod + 1];
    nextSlide = nm.slides[0];
    nextModId = nm.id;
  }
  return `
    <div class="slide-nav">
      ${prev ? `
        <a class="slide-nav-btn" href="#/${mod.id}/${prev.id}"
           onclick="event.preventDefault(); navTo('${mod.id}','${prev.id}')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
          <span>
            <span class="ctx">Previous</span>
            <span class="ttl">${escapeHtml(prev.title)}</span>
          </span>
        </a>` : `<span class="slide-nav-btn disabled">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
          <span><span class="ctx">Previous</span><span class="ttl">First slide</span></span></span>`}
      ${nextSlide ? `
        <a class="slide-nav-btn" href="#/${nextModId}/${nextSlide.id}"
           onclick="event.preventDefault(); navTo('${nextModId}','${nextSlide.id}')">
          <span style="text-align:right;">
            <span class="ctx">Next</span>
            <span class="ttl">${escapeHtml(nextSlide.title)}</span>
          </span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </a>` : `<span class="slide-nav-btn disabled">
          <span style="text-align:right;"><span class="ctx">Next</span><span class="ttl">Last slide</span></span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></span>`}
    </div>`;
}

/* Lightbox */
function openLightbox(src, alt) {
  const lb = document.getElementById('lightbox');
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightboxImg').alt = alt || '';
  lb.classList.add('active');
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('active'); }

/* Present mode */
function startPresent() {
  if (activeSlide === -1) {
    // Start from first slide of current module
    activeSlide = 0;
  }
  renderPresent();
  document.getElementById('presentMode').classList.add('active');
}
function endPresent() {
  document.getElementById('presentMode').classList.remove('active');
  const a = document.getElementById('pAudio');
  a.pause(); a.currentTime = 0;
}
function presentNext() {
  const mod = LIBRARY.modules[activeMod];
  if (activeSlide < mod.slides.length - 1) activeSlide++;
  else if (activeMod < LIBRARY.modules.length - 1) {
    activeMod++; activeSlide = 0;
  } else return;
  navTo(LIBRARY.modules[activeMod].id, LIBRARY.modules[activeMod].slides[activeSlide].id);
  renderPresent();
}
function presentPrev() {
  if (activeSlide > 0) activeSlide--;
  else if (activeMod > 0) {
    activeMod--; activeSlide = LIBRARY.modules[activeMod].slides.length - 1;
  } else return;
  navTo(LIBRARY.modules[activeMod].id, LIBRARY.modules[activeMod].slides[activeSlide].id);
  renderPresent();
}
function renderPresent() {
  const mod = LIBRARY.modules[activeMod];
  const slide = mod.slides[activeSlide];
  document.getElementById('pTopic').textContent = mod.title;
  document.getElementById('pPairing').textContent = PAIRING_LABELS[slide.pairing] || slide.pairing;
  document.getElementById('pTitle').textContent = slide.title;
  document.getElementById('pSubtitle').textContent = slide.subtitle || '';
  document.getElementById('pCounter').textContent =
    `${activeSlide + 1} / ${mod.slides.length}`;

  // Apply single-image layout to present mode if needed
  const layout = slide.imageLayout || 'two';
  const pImages = document.querySelector('.p-images');
  if (pImages) pImages.classList.toggle('single-image', layout === 'one');

  const a = slide.images[0], b = slide.images[1];
  const imgA = document.getElementById('pImgA');
  const imgB = document.getElementById('pImgB');
  imgA.innerHTML = a.src ? `<img src="${escapeHtml(a.src)}" alt="" />` : 'No image yet';
  imgB.innerHTML = b.src ? `<img src="${escapeHtml(b.src)}" alt="" />` : 'No image yet';
  document.getElementById('pTagA').textContent = a.type || 'A';
  document.getElementById('pTagB').textContent = b.type || 'B';
  document.getElementById('pLabelA').textContent = a.label || '';
  document.getElementById('pLabelB').textContent = b.label || '';

  const tk = document.getElementById('pTakeawayBox');
  if (slide.keyLesson) {
    document.getElementById('pTakeaway').textContent = slide.keyLesson;
    tk.style.display = '';
  } else { tk.style.display = 'none'; }

  const audio = document.getElementById('pAudio');
  const audioBox = document.getElementById('pAudioBox');
  if (slide.narration && slide.narration.audio) {
    audio.src = slide.narration.audio;
    audioBox.style.display = '';
    audio.play().catch(()=>{});
  } else {
    audio.removeAttribute('src');
    audioBox.style.display = 'none';
  }
}

/* Keyboard nav */
document.addEventListener('keydown', e => {
  const presenting = document.getElementById('presentMode').classList.contains('active');
  const lbActive = document.getElementById('lightbox').classList.contains('active');
  if (e.key === 'Escape') {
    if (lbActive) { closeLightbox(); return; }
    if (presenting) { endPresent(); return; }
  }
  if (presenting) {
    if (e.key === 'ArrowRight' || e.key === 'PageDown') { presentNext(); e.preventDefault(); }
    else if (e.key === 'ArrowLeft' || e.key === 'PageUp') { presentPrev(); e.preventDefault(); }
    else if (e.key === ' ') {
      const a = document.getElementById('pAudio');
      if (a.src) { a.paused ? a.play() : a.pause(); e.preventDefault(); }
    }
    return;
  }
  // Edit mode keyboard nav
  if (e.target.matches('input, textarea')) return;
  if (activeSlide >= 0) {
    if (e.key === 'ArrowRight' || e.key === 'j') {
      const mod = LIBRARY.modules[activeMod];
      if (activeSlide < mod.slides.length - 1) {
        navTo(mod.id, mod.slides[activeSlide+1].id);
      }
    } else if (e.key === 'ArrowLeft' || e.key === 'k') {
      const mod = LIBRARY.modules[activeMod];
      if (activeSlide > 0) {
        navTo(mod.id, mod.slides[activeSlide-1].id);
      }
    }
  }
});

/* Init */
loadLibrary();
</script>
</body>
</html>
